<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ProbabilityLab: calculadora interactiva de distribuciones de probabilidad."
    />
    <title>ProbabilityLab</title>
    <script type="module" crossorigin src="/assets/index-DAclEjBq.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-puh3bSR-.css">
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div>
          <p class="eyebrow">Laboratorio estadístico interactivo</p>
          <h1>ProbabilityLab</h1>
        </div>
        <div class="header-actions">
          <button class="icon-button" id="download-chart" type="button" title="Descargar gráfico">
            <span class="button-icon" id="download-chart-icon" aria-hidden="true"></span>
            <span class="sr-only">Descargar gráfico</span>
          </button>
          <button class="theme-toggle" id="theme-toggle" type="button">
            <span class="button-icon" aria-hidden="true"></span>
            <span>Cambiar tema</span>
          </button>
        </div>
      </header>

      <div class="app-shell">
        <aside class="control-panel" id="controls" aria-label="Controles de distribución"></aside>

        <main class="workspace">
          <section class="summary-band" aria-live="polite">
            <div>
              <p class="section-label">Resultado</p>
              <h2 id="result-expression">Selecciona una distribución</h2>
            </div>
            <button class="copy-button" id="copy-result" type="button">
              <span class="button-icon" id="copy-result-icon" aria-hidden="true"></span>
              <span>Copiar</span>
            </button>
          </section>

          <section class="chart-stage" aria-label="Gráfico de distribución">
            <canvas id="probability-chart" width="1200" height="680"></canvas>
          </section>

          <section class="info-grid">
            <article class="distribution-note">
              <p class="section-label">Descripción</p>
              <h3 id="distribution-title"></h3>
              <p id="distribution-description"></p>
              <p class="example" id="distribution-example"></p>
            </article>
            <article class="discrete-table-card" id="discrete-table-card" hidden>
              <div class="table-heading">
                <div>
                  <p class="section-label">Tabla discreta</p>
                  <h3>Valores incluidos</h3>
                </div>
              </div>
              <div id="discrete-table"></div>
            </article>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
